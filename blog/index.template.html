    <!-- CSS Crítico Inline: evita FOUC (Flash of Unstyled Content) na navbar -->
    <style>
        .navbar {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(20, 20, 20, 0.96);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 107, 53, 0.2);
            box-shadow: 0 2px 20px rgba(0,0,0,0.5);
        }
        .navbar-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            flex-shrink: 0;
        }
        .navbar-logo {
            width: 38px; height: 38px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ff6b35;
        }
        .navbar-name {
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
        }
        .navbar-links {
            display: flex;
            align-items: center;
            gap: 2px;
            list-style: none;
            margin: 0; padding: 0;
        }
        .nav-link {
            display: inline-block;
            padding: 8px 13px;
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            border-radius: 6px;
            white-space: nowrap;
        }
        .nav-cta {
            background: #ff6b35;
            color: #fff !important;
            font-weight: 700 !important;
            border-radius: 8px !important;
            padding: 9px 15px !important;
            margin-left: 6px;
        }
        .nav-portal {
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 8px;
            padding: 8px 13px;
            color: rgba(255,255,255,0.9);
        }
        .navbar-toggle { display: none; }
        .navbar-overlay { display: none; }
        @media (max-width: 860px) {
            .navbar-toggle {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 5px;
                width: 40px; height: 40px;
                background: none;
                border: none;
                cursor: pointer;
                flex-shrink: 0;
            }
            .hamburger-line {
                display: block;
                width: 24px; height: 2px;
                background: #fff;
                border-radius: 2px;
            }
            .navbar-links {
                position: fixed;
                top: 0; right: -280px;
                width: 270px;
                height: 100dvh;
                background: #141414;
                border-left: 2px solid #ff6b35;
                flex-direction: column;
                align-items: stretch;
                padding: 80px 0 24px;
                z-index: 1001;
                transition: right 0.3s ease;
            }
            .navbar-links.open { right: 0; }
        }
    </style>
