<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionando... | Blog Karina Franzin</title>
    <script>
        (function() {
            var urlParams = new URLSearchParams(window.location.search);
            var slug = urlParams.get('slug');
            if (slug) {
                // Redireciona para a nova URL limpa (ex: /blog/como-comecar-do-zero/)
                window.location.replace('/blog/' + slug + '/');
            } else {
                window.location.replace('/blog/');
            }
        })();
    </script>
</head>
<body>
    <p>Redirecionando para o artigo... Se não for redirecionado em instantes, <a href="/blog/">clique aqui</a>.</p>
</body>
</html>
