<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Gerenciar Artigos | Karina Franzin</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <h1>🏃‍♀️ Karina Franzin</h1>
                <p>Painel Administrativo</p>
            </div>
            <div class="user-info">
                <span id="userEmail">Carregando...</span>
                <button id="btnLogout" class="btn-logout">Sair</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Actions Bar -->
            <div class="actions-bar">
                <h2>Meus Artigos</h2>
                <button id="btnNewArticle" class="btn-primary">
                    ➕ Novo Artigo
                </button>
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="loading-state">
                <div class="spinner"></div>
                <p>Carregando artigos...</p>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state" style="display: none;">
                <div class="empty-icon">📝</div>
                <h3>Nenhum artigo ainda</h3>
                <p>Comece criando seu primeiro artigo para o blog!</p>
                <button class="btn-primary" onclick="window.location.href='editor.html'">
                    ➕ Criar Primeiro Artigo
                </button>
            </div>

            <!-- Articles Grid -->
            <div id="articlesGrid" class="articles-grid" style="display: none;">
                <!-- Artigos serão inseridos aqui via JavaScript -->
            </div>
        </div>
    </main>

    <!-- Modal de Confirmação de Exclusão -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <h3>⚠️ Confirmar Exclusão</h3>
            <p>Tem certeza que deseja excluir este artigo?</p>
            <p class="modal-warning">Esta ação não pode ser desfeita!</p>
            <div class="modal-actions">
                <button id="btnCancelDelete" class="btn-secondary">Cancelar</button>
                <button id="btnConfirmDelete" class="btn-danger">Excluir Artigo</button>
            </div>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
