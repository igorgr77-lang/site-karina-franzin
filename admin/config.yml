# Configuração do NetlifyCMS para Blog Karina Franzin

backend:
  name: github
  repo: igorgr77-lang/site-karina-franzin
  branch: main

# Onde salvar os arquivos
media_folder: "site-karina-franzin/assets/img/blog"
public_folder: "/assets/img/blog"

# Idioma do painel
locale: 'pt'

# Collections (tipos de conteúdo)
collections:
  - name: "blog"
    label: "Artigos do Blog"
    folder: "site-karina-franzin/blog"
    create: true
    slug: "{{slug}}"
    editor:
      preview: true
    fields:
      - {label: "Título", name: "title", widget: "string", required: true}
      - {label: "Data de Publicação", name: "date", widget: "datetime", required: true}
      - {label: "Autor", name: "author", widget: "string", default: "Karina Franzin"}
      - {label: "Descrição Resumida", name: "description", widget: "text", required: true, hint: "Resumo que aparece no card do blog e SEO (150-160 caracteres)"}
      - {label: "Imagem de Capa", name: "featured_image", widget: "image", required: true, hint: "Imagem principal do artigo"}
      - {label: "Alt da Imagem", name: "image_alt", widget: "string", required: true, hint: "Descrição da imagem para acessibilidade"}
      - {label: "Categoria", name: "category", widget: "select", options: ["Dicas de Corrida", "Treinamento", "Eventos", "Iniciantes", "Nutrição", "Motivação"], default: "Dicas de Corrida"}
      - {label: "Tags", name: "tags", widget: "list", required: false, hint: "Palavras-chave separadas (ex: corrida, treino, 5km)"}
      - {label: "Conteúdo", name: "body", widget: "markdown", required: true, hint: "Use ## para títulos, **negrito**, *itálico*, - para listas"}
      - {label: "SEO - Título", name: "seo_title", widget: "string", required: false, hint: "Título otimizado para Google (deixe vazio para usar o título principal)"}
      - {label: "SEO - Palavras-chave", name: "seo_keywords", widget: "string", required: false, hint: "Palavras-chave separadas por vírgula"}
